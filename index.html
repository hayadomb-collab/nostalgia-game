<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>שעשועון נוסטלגי - מופע מלא</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction:rtl;
    text-align:center;
    background: linear-gradient(135deg,#00c2c2,#ffb347,#ffe66d);
    overflow:hidden;
}

/* מנחה */
.host{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    padding:10px 15px;
    border-radius:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    font-size:16px;
}

/* קהל */
#audience{
    position:fixed;
    bottom:10px;
    width:100%;
    font-size:30px;
}

/* כרטיס */
.card{
    max-width:800px;
    margin:80px auto;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

.word{font-size:50px;font-weight:bold;}
.meaning{display:none;font-size:22px;margin-top:20px;}

/* כפתורים */
button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}

.next{background:#00c2c2;color:white;}
.show{background:#ffb347;}
.good{background:#4CAF50;color:white;}
.bad{background:#ff4d4d;color:white;}

/* אפקטים */
.correctFlash{animation:flashGreen 0.5s;}
.wrongShake{animation:shake 0.5s;}

@keyframes flashGreen{
    0%{background:white;}
    50%{background:#b6ffb6;}
    100%{background:white;}
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    100%{transform:translateX(0);}
}

/* קונפטי */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);}
}

/* כוכבים */
.star{
    position:fixed;
    font-size:20px;
    animation:fallStar 2s linear;
}

@keyframes fallStar{
    to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="host" id="host">🎤 המנחה: מוכנים לשאלה הבאה!</div>
<div id="audience">👏👏👏👏👏</div>

<div class="card" id="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>

    <button class="show" onclick="show()">הצג פירוש</button>
    <button class="good" onclick="correct()">נכון ✔</button>
    <button class="bad" onclick="wrong()">שגוי ✖</button>
    <button class="next" onclick="next()">שאלה הבאה ➡</button>
</div>

<script>

/* 🎵 צלילים */
function sound(type){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let o = ctx.createOscillator();
    o.connect(ctx.destination);

    if(type==="good"){
        o.frequency.value=700;
    }else{
        o.frequency.value=200;
    }

    o.start();
    setTimeout(()=>o.stop(),200);
}

/* 🎤 דמויות */
const hosts=[
"🎤 המנחה: וואו איזו מילה!",
"🎤 המנחה: מי זוכר את זה?",
"🎤 המנחה: נוסטלגיה באוויר!",
"🎤 המנחה: בום של זיכרון!"
];

function randomHost(){
    document.getElementById("host").innerText=
    hosts[Math.floor(Math.random()*hosts.length)];
}

/* נתונים */
const data=[
["חנטריש","שטויות"],
["פוילישטיק","תעלול"],
["סמטוחה","בלגן"],
["ברוך","צרה"],
["חולירה","מעצבן"],
["בובה מייסעס","סיפורי סבתא"],
["נבך","מסכן"],
["קלפטה","נרגנת"],
["שאפה","כל הכבוד"],
["זבנג","מכה"],
["סבבה","מצוין"],
["פרייר","נוצל"],
["לעשות רוח","להשוויץ"],
["התברבר","הלך לאיבוד"],
["יאללה","קדימה"],
["לפלף","חסר ביטחון"],
["פדיחה","מבוכה"],
["חרטטן","ממציא"],
["קשקוש בלבוש","שטויות"],
["בומבה","מרשים"],
["דאווין","השווצה"],
["חאפלות","מסיבה"],
["ווזווז","פטפטן"],
["טמבל","טיפש"],
["בטלן","לא עובד"],
["שנורר","מבקש כסף"],
["שמונצעס","שטויות"],
["שייגעץ","שובב"],
["מענטש","אדם טוב"],
["אוי ויי","צער"]
];

let i=0;

function render(){
    document.getElementById("word").innerText=data[i][0];
    document.getElementById("meaning").innerText=data[i][1];
    document.getElementById("meaning").style.display="none";
    randomHost();
}

function show(){
    document.getElementById("meaning").style.display="block";
}

function correct(){
    sound("good");
    flash(true);
    confetti();
    stars();
}

function wrong(){
    sound("bad");
    flash(false);
}

function flash(ok){
    let c=document.getElementById("card");
    c.classList.add(ok?"correctFlash":"wrongShake");
    setTimeout(()=>c.classList.remove("correctFlash","wrongShake"),500);
}

function next(){
    i=(i+1)%data.length;
    render();
}

/* 🎊 קונפטי */
function confetti(){
    for(let j=0;j<30;j++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

/* ⭐ כוכבים */
function stars(){
    for(let j=0;j<15;j++){
        let s=document.createElement("div");
        s.className="star";
        s.innerText="⭐";
        s.style.left=Math.random()*100+"vw";
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),2000);
    }
}

/* 🎵 מוזיקת פתיחה */
function introSound(){
    let ctx=new (window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator();
    o.type="square";
    o.frequency.value=440;
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),500);
}

introSound();
render();

</script>

</body>
</html>

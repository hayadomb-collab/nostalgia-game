<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>משחק נוסטלגי</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #00c2c2, #ffb347, #ffe66d);
    overflow-x: hidden;
}

/* כרטיס */
.card {
    background: white;
    max-width: 750px;
    margin: 40px auto;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.4s;
}

/* טקסט */
.word {
    font-size: 40px;
    font-weight: bold;
}

.meaning {
    margin-top: 20px;
    font-size: 22px;
    display: none;
}

/* כפתורים */
button {
    font-size: 18px;
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.next { background: #00c2c2; color: white; }
.prev { background: #ffb347; }
.show { background: #ffe66d; }

/* תשובה נכונה */
.correct {
    border: 5px solid green;
    animation: pop 0.5s;
}

/* תשובה שגויה */
.wrong {
    border: 5px solid red;
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    100% { transform: translateX(0); }
}

@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* קונפטי */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: -10px;
    animation: fall 3s linear;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(720deg); }
}

/* פינת נוסטלגיה */
.nostalgia {
    display: none;
    background: rgba(255,255,255,0.95);
    padding: 20px;
    margin: 20px auto;
    max-width: 600px;
    border-radius: 20px;
}
</style>
</head>

<body>

<h1>🎲 משחק נוסטלגי</h1>

<div class="card" id="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>

    <button class="prev" onclick="prevQ()">⬅</button>
    <button class="show" onclick="toggle()">הצג פירוש</button>
    <button class="next" onclick="nextQ()">➡</button>
</div>

<div class="nostalgia" id="nostalgia">
📻 רדיו טרנזיסטור • ☎ טלפון חוגה • 🚗 סוסיתא • 📺 שחור־לבן • 💿 פטיפון • 🛵 וספה • 🥤 גזוז • 🍦 ארטיק  
<br><br>
"אם זיהית את זה בלי לחשוב – כנראה שהילדות שלך הייתה בשחור־לבן אבל עם הרבה צבע בלב 💛"
</div>

<script>
const data = [
["חנטריש","שטויות"],
["פוילישטיק","תעלול"],
["סמטוחה","בלגן"],
["ברוך","צרה"],
["חולירה","מעצבן"],
["בובה מייסעס","סיפורי סבתא"],
["נבך","מסכן"],
["קלפטה","נרגנת"],
["שאפה","כל הכבוד"],
["זבנג","מכה"],
["סבבה","מצוין"],
["פרייר","נוצל"],
["לעשות רוח","להשוויץ"],
["התברבר","הלך לאיבוד"],
["יאללה","קדימה"],
["לפלף","חסר ביטחון"],
["פדיחה","מבוכה"],
["חרטטן","ממציא"],
["קשקוש בלבוש","שטויות"],
["בומבה","מרשים"],
["דאווין","השווצה"],
["חאפלות","מסיבה"],
["ווזווז","פטפטן"],
["טמבל","טיפש"],
["בטלן","לא עובד"],
["שנורר","מבקש כסף"],
["שמונצעס","שטויות"],
["שייגעץ","שובב"],
["מענטש","אדם טוב"],
["אוי ויי","צער"]
];

let i = 0;

function render(){
    document.getElementById("word").innerText = data[i][0];
    document.getElementById("meaning").innerText = data[i][1];
    document.getElementById("meaning").style.display = "none";

    if(i>0 && i%5===0){
        document.getElementById("nostalgia").style.display = "block";
    } else {
        document.getElementById("nostalgia").style.display = "none";
    }
}

function nextQ(){
    i = (i+1)%data.length;
    render();
}

function prevQ(){
    i = (i-1+data.length)%data.length;
    render();
}

function toggle(){
    let m = document.getElementById("meaning");
    let card = document.getElementById("card");

    if(m.style.display==="block"){
        m.style.display="none";
    } else {
        m.style.display="block";
        correct();
    }
}

function correct(){
    const card = document.getElementById("card");
    card.classList.add("correct");
    confetti();
    setTimeout(()=>card.classList.remove("correct"),1000);
}

function confetti(){
    for(let i=0;i<30;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

render();
</script>

</body>
</html>

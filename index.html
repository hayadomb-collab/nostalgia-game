<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>שעשועון נוסטלגי - מופע אלבום</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction:rtl;
    text-align:center;
    background: linear-gradient(135deg,#00c2c2,#ffb347,#ffe66d);
    overflow:hidden;
}

/* מסך פתיחה אלבום */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#222;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:10;
}

/* אלבום */
.album{
    width:220px;
    height:160px;
    background:#8b5e3c;
    border-radius:10px;
    position:relative;
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
    animation: openAlbum 2s forwards;
}

/* דפי אלבום */
.album:before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:#f5f0e6;
    border-radius:10px;
    transform-origin:left;
    animation: openPages 2s forwards;
}

@keyframes openAlbum{
    0%{transform:scale(1);}
    100%{transform:scale(1.1);}
}

@keyframes openPages{
    0%{transform:rotateY(0deg);}
    100%{transform:rotateY(-120deg);}
}

/* דמויות */
.family{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    opacity:0;
    animation: popOut 2s forwards 1.5s;
}

@keyframes popOut{
    0%{opacity:0; transform:translate(-50%,-50%) scale(0.5);}
    100%{opacity:1; transform:translate(-50%,-180%) scale(1.2);}
}

/* משחק */
#game{
    display:none;
}

.card{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.word{font-size:50px;font-weight:bold;}
.meaning{display:none;font-size:22px;margin-top:20px;}

button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}

.show{background:#ffb347;}
.next{background:#00c2c2;color:white;}
.good{background:#4CAF50;color:white;}
.bad{background:#ff4d4d;color:white;}

/* קונפטי */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);}
}

/* כוכבים */
.star{
    position:fixed;
    font-size:18px;
    animation:fallStar 2s linear;
}

@keyframes fallStar{
    to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>📖 אלבום הזיכרונות נפתח...</h1>
    <div class="album"></div>

    <div class="family">
        👨‍🦳 👵 👨‍👩‍👧‍👦
    </div>

    <p style="margin-top:30px;">🎬 רגע של נוסטלגיה...</p>
</div>

<!-- GAME -->
<div id="game">

<div class="card" id="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>

    <button class="show" onclick="show()">הצג פירוש</button>
    <button class="good" onclick="good()">נכון ✔</button>
    <button class="bad" onclick="bad()">שגוי ✖</button>
    <button class="next" onclick="next()">שאלה הבאה ➡</button>
</div>

</div>

<script>

const data=[
["חנטריש","שטויות"],
["פוילישטיק","תעלול"],
["סמטוחה","בלגן"],
["ברוך","צרה"],
["חולירה","מעצבן"],
["בובה מייסעס","סיפורי סבתא"],
["נבך","מסכן"],
["קלפטה","נרגנת"],
["שאפה","כל הכבוד"],
["זבנג","מכה"],
["סבבה","מצוין"],
["פרייר","נוצל"],
["לעשות רוח","להשוויץ"],
["התברבר","הלך לאיבוד"],
["יאללה","קדימה"],
["לפלף","חסר ביטחון"],
["פדיחה","מבוכה"],
["חרטטן","ממציא"],
["קשקוש בלבוש","שטויות"],
["בומבה","מרשים"],
["דאווין","השווצה"],
["חאפלות","מסיבה"],
["ווזווז","פטפטן"],
["טמבל","טיפש"],
["בטלן","לא עובד"],
["שנורר","מבקש כסף"],
["שמונצעס","שטויות"],
["שייגעץ","שובב"],
["מענטש","אדם טוב"],
["אוי ויי","צער"]
];

let i=0;

/* התחלת משחק אחרי אלבום */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("game").style.display="block";
    render();
    introSound();
},3500);

/* מוזיקת פתיחה */
function introSound(){
    let ctx=new (window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator();
    o.frequency.value=520;
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),600);
}

/* רנדר */
function render(){
    document.getElementById("word").innerText=data[i][0];
    document.getElementById("meaning").innerText=data[i][1];
    document.getElementById("meaning").style.display="none";
}

/* הצג תשובה */
function show(){
    document.getElementById("meaning").style.display="block";
}

/* נכון */
function good(){
    flash(true);
    confetti();
    stars();
}

/* שגוי */
function bad(){
    flash(false);
}

/* מעבר */
function next(){
    i=(i+1)%data.length;
    render();
}

/* פלאש */
function flash(ok){
    let c=document.getElementById("card");
    c.style.border=ok?"5px solid green":"5px solid red";
    setTimeout(()=>c.style.border="none",500);
}

/* קונפטי */
function confetti(){
    for(let j=0;j<25;j++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

/* כוכבים */
function stars(){
    for(let j=0;j<15;j++){
        let s=document.createElement("div");
        s.className="star";
        s.innerText="⭐";
        s.style.left=Math.random()*100+"vw";
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),2000);
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>שעשועון נוסטלגי</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    text-align:center;
    background: linear-gradient(135deg,#00c2c2,#ffb347,#ffe66d);
}

/* מסכים */
.screen{
    display:none;
    padding:30px;
}

.active{
    display:block;
}

/* פתיחה וסיום */
#startScreen, #endScreen{
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: rgba(0,0,0,0.7);
}

h1{font-size:50px}

/* כרטיס שאלה */
.card{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.word{font-size:48px;font-weight:bold;}
.meaning{display:none;font-size:24px;margin-top:20px;}

/* כפתורים */
button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}

.show{background:#ffb347;}
.next{background:#00c2c2;color:white;}
.aBtn{background:#4CAF50;color:white;}
.bBtn{background:#ff4d4d;color:white;}

/* ניקוד */
.scoreboard{
    font-size:22px;
    margin-top:10px;
}

/* טיימר */
#timer{
    font-size:26px;
    font-weight:bold;
    margin:10px;
}

/* נוסטלגיה */
#nostalgia{
    display:none;
    background:white;
    padding:15px;
    border-radius:15px;
    margin:20px auto;
    max-width:600px;
}

/* קונפטי */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>

<!-- פתיחה -->
<div id="startScreen" class="screen active">
    <h1>🎤 שעשועון נוסטלגיה</h1>
    <p>מילים של פעם • זיכרונות של פעם</p>
    <button onclick="start()">▶ התחלה</button>
</div>

<!-- משחק -->
<div id="gameScreen" class="screen">

<div class="scoreboard">
🏆 קבוצה A: <span id="scoreA">0</span> |
🏆 קבוצה B: <span id="scoreB">0</span>
</div>

<div id="timer">⏱️ 10</div>

<div class="card" id="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>

    <button class="show" onclick="showMeaning()">הצג פירוש</button>
    <button class="aBtn" onclick="score('A')">A צודקת</button>
    <button class="bBtn" onclick="score('B')">B צודקת</button>
    <button class="next" onclick="next()">שאלה הבאה ➡</button>
</div>

<div id="nostalgia"></div>

</div>

<!-- סוף -->
<div id="endScreen" class="screen">
    <h1>🏁 סיום המשחק</h1>
    <h2 id="winner"></h2>
</div>

<script>

const data = [
["חנטריש","שטויות"],
["פוילישטיק","תעלול"],
["סמטוחה","בלגן"],
["ברוך","צרה"],
["חולירה","מעצבן"],
["בובה מייסעס","סיפורי סבתא"],
["נבך","מסכן"],
["קלפטה","נרגנת"],
["שאפה","כל הכבוד"],
["זבנג","מכה"],
["סבבה","מצוין"],
["פרייר","נוצל"],
["לעשות רוח","להשוויץ"],
["התברבר","הלך לאיבוד"],
["יאללה","קדימה"],
["לפלף","חסר ביטחון"],
["פדיחה","מבוכה"],
["חרטטן","ממציא"],
["קשקוש בלבוש","שטויות"],
["בומבה","מרשים"],
["דאווין","השווצה"],
["חאפלות","מסיבה"],
["ווזווז","פטפטן"],
["טמבל","טיפש"],
["בטלן","לא עובד"],
["שנורר","מבקש כסף"],
["שמונצעס","שטויות"],
["שייגעץ","שובב"],
["מענטש","אדם טוב"],
["אוי ויי","צער"]
];

let i=0;
let scoreA=0;
let scoreB=0;
let timer=10;
let t;

function start(){
    document.getElementById("startScreen").classList.remove("active");
    document.getElementById("gameScreen").classList.add("active");
    render();
    startTimer();
}

function render(){
    document.getElementById("word").innerText=data[i][0];
    document.getElementById("meaning").innerText=data[i][1];
    document.getElementById("meaning").style.display="none";

    if(i>0 && i%5===0){
        document.getElementById("nostalgia").style.display="block";
        document.getElementById("nostalgia").innerHTML=
        "📻 רדיו • ☎ טלפון חוגה • 🚗 סוסיתא • 📺 שחור לבן • 💿 פטיפון<br><br>" +
        "💛 אם זיהית את זה – כנראה גדלת בעידן קסום";
    } else {
        document.getElementById("nostalgia").style.display="none";
    }
}

function next(){
    i++;
    if(i>=data.length){
        endGame();
        return;
    }
    resetTimer();
    render();
}

function showMeaning(){
    document.getElementById("meaning").style.display="block";
}

function score(team){
    if(team==="A"){
        scoreA++;
        document.getElementById("scoreA").innerText=scoreA;
    } else {
        scoreB++;
        document.getElementById("scoreB").innerText=scoreB;
    }
    confetti();
}

function startTimer(){
    t=setInterval(()=>{
        timer--;
        document.getElementById("timer").innerText="⏱️ "+timer;

        if(timer<=0){
            next();
        }
    },1000);
}

function resetTimer(){
    timer=10;
    document.getElementById("timer").innerText="⏱️ 10";
}

function confetti(){
    for(let j=0;j<25;j++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

function endGame(){
    document.getElementById("gameScreen").classList.remove("active");
    document.getElementById("endScreen").classList.add("active");

    let winner="תיקו!";
    if(scoreA>scoreB) winner="🏆 קבוצה A מנצחת!";
    if(scoreB>scoreA) winner="🏆 קבוצה B מנצחת!";

    document.getElementById("winner").innerText=winner;
}

render();

</script>

</body>
</html>

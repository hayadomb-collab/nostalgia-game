<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>משחק נוסטלגי</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      direction: rtl;
      background: #f5f5f5;
      padding-top: 80px;
    }

    h1 {
      color: #222;
    }

    button {
      font-size: 22px;
      padding: 12px 25px;
      margin-top: 20px;
      cursor: pointer;
    }

    #gameBox {
      margin-top: 40px;
      font-size: 20px;
      color: darkblue;
    }
  </style>
</head>

<body>

  <h1>🎮 משחק המילים הנוסטלגי</h1>

  <button onclick="startGame()">התחילי משחק</button>

  <div id="gameBox"></div>

  <script>
    function startGame() {
      document.getElementById("gameBox").innerHTML =
        "המשחק התחיל 🎉<br>שאלה ראשונה תעלה בקרוב...";
    }
  </script>

</body>
</html>

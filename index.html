<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>משחק נוסטלגי</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      direction: rtl;
      background: #f5f5f5;
      padding-top: 80px;
    }

    h1 {
      color: #222;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin-top: 20px;
      cursor: pointer;
    }

    #gameBox {
      margin-top: 40px;
      font-size: 22px;
      color: darkblue;
    }

    input {
      font-size: 18px;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>🎮 משחק המילים הנוסטלגי</h1>

  <button onclick="startGame()">התחילי משחק</button>

  <div id="gameBox"></div>

  <script>
    function startGame() {
      document.getElementById("gameBox").innerHTML = `
        <p>שאלה 1:</p>
        <p>מה המילה שמתחילה ב־נ ומסתיימת ב־גה?</p>
        <input id="answer" placeholder="כתבי תשובה">
        <br><br>
        <button onclick="checkAnswer()">בדקי תשובה</button>
        <div id="result"></div>
      `;
    }

    function checkAnswer() {
      let ans = document.getElementById("answer").value;

      if (ans.trim() === "נוסטלגיה") {
        document.getElementById("result").innerHTML = "✔ תשובה נכונה!";
      } else {
        document.getElementById("result").innerHTML = "✖ לא נכון, נסי שוב";
      }
    }
  </script>

</body>
</html>

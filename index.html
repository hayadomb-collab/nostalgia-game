<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>שעשועון נוסטלגי</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    text-align:center;
    background: linear-gradient(135deg,#00c2c2,#ffb347,#ffe66d);
}

/* מסך פתיחה */
#startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* כרטיס */
.card{
    max-width:750px;
    margin:30px auto;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* טקסט */
.word{font-size:40px;font-weight:bold;}
.meaning{display:none;font-size:22px;margin-top:20px;}

/* כפתורים */
.next{background:#00c2c2;color:white;}
.show{background:#ffb347;}
.wrong{background:#ff4d4d;color:white;}
.correct{background:#4CAF50;color:white;}

/* ניקוד */
.scoreboard{
    font-size:20px;
    margin:10px;
}

/* טיימר */
#timer{
    font-size:22px;
    margin:10px;
    font-weight:bold;
}

/* פינת נוסטלגיה */
#nostalgia{
    display:none;
    background:white;
    margin:20px auto;
    max-width:600px;
    padding:15px;
    border-radius:15px;
}

/* קונפטי */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear;
}
@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>🎤 שעשועון נוסטלגי</h1>
    <p>לחצו כדי להתחיל</p>
    <button onclick="startGame()">▶ התחלה</button>
</div>

<div class="scoreboard">
🏆 קבוצה A: <span id="a">0</span> |
🏆 קבוצה B: <span id="b">0</span>
</div>

<div id="timer">⏱️ 10</div>

<div class="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>

    <button class="show" onclick="showAnswer()">הצג פירוש</button>
    <button class="correct" onclick="score('A')">קבוצה A צודקת</button>
    <button class="wrong" onclick="score('B')">קבוצה B צודקת</button>
    <button class="next" onclick="next()">שאלה הבאה ➡</button>
</div>

<div id="nostalgia"></div>

<script>

const data=[
["חנטריש","שטויות"],
["פוילישטיק","תעלול"],
["סמטוחה","בלגן"],
["ברוך","צרה"],
["חולירה","מעצבן"],
["בובה מייסעס","סיפורי סבתא"],
["נבך","מסכן"],
["קלפטה","נרגנת"],
["שאפה","כל הכבוד"],
["זבנג","מכה"],
["סבבה","מצוין"],
["פרייר","נוצל"],
["לעשות רוח","להשוויץ"],
["התברבר","הלך לאיבוד"],
["יאללה","קדימה"],
["לפלף","חסר ביטחון"],
["פדיחה","מבוכה"],
["חרטטן","ממציא"],
["קשקוש בלבוש","שטויות"],
["בומבה","מרשים"],
["דאווין","השווצה"],
["חאפלות","מסיבה"],
["ווזווז","פטפטן"],
["טמבל","טיפש"],
["בטלן","לא עובד"],
["שנורר","מבקש כסף"],
["שמונצעס","שטויות"],
["שייגעץ","שובב"],
["מענטש","אדם טוב"],
["אוי ויי","צער"]
];

let i=0;
let scoreA=0;
let scoreB=0;
let time=10;
let timer;

function startGame(){
    document.getElementById("startScreen").style.display="none";
    render();
    startTimer();
}

function render(){
    document.getElementById("word").innerText=data[i][0];
    document.getElementById("meaning").innerText=data[i][1];
    document.getElementById("meaning").style.display="none";

    if(i%5===0 && i!==0){
        document.getElementById("nostalgia").style.display="block";
        document.getElementById("nostalgia").innerHTML=
        "📻 נוסטלגיה: רדיו טרנזיסטור • טלפון חוגה • סוסיתא • פטיפון<br><br>" +
        "💛 אם זיהית את זה בלי לחשוב – גדלת בעידן קסום!";
    } else {
        document.getElementById("nostalgia").style.display="none";
    }
}

function next(){
    i=(i+1)%data.length;
    resetTimer();
    render();
}

function showAnswer(){
    document.getElementById("meaning").style.display="block";
    correctAnim();
}

function score(team){
    if(team==="A"){
        scoreA++;
        document.getElementById("a").innerText=scoreA;
    } else {
        scoreB++;
        document.getElementById("b").innerText=scoreB;
    }
    confetti();
    correctAnim();
}

function correctAnim(){
    document.querySelector(".card").style.border="5px solid green";
    setTimeout(()=>document.querySelector(".card").style.border="none",800);
}

function startTimer(){
    timer=setInterval(()=>{
        time--;
        document.getElementById("timer").innerText="⏱️ "+time;

        if(time<=0){
            next();
        }
    },1000);
}

function resetTimer(){
    time=10;
    document.getElementById("timer").innerText="⏱️ 10";
}

function confetti(){
    for(let j=0;j<25;j++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

render();

</script>

</body>
</html>
